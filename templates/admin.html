<!doctype html>
<html>
  <head>
    <title>Chaos Control Panel</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
  </head>
  <body class="bg-dark text-white p-5">
    <div class="container border border-secondary p-4 rounded">
      <h2>Control Panel</h2>
      <hr />
      <p>
        <strong>Instance ID:</strong> {{ meta.id }} | <strong>AZ:</strong> {{
        meta.az }}
      </p>

      <div class="row mt-4">
        <div class="col">
          <button onclick="toggle('error')" class="btn btn-danger w-100 py-3">
            Simulate 500 Errors
          </button>
        </div>
        <div class="col">
          <button
            onclick="toggle('latency')"
            class="btn btn-warning w-100 py-3"
          >
            Trigger Latency Spikes
          </button>
        </div>
      </div>
      <div class="row mt-3">
        <div class="col">
          <a
            href="/health"
            target="_blank"
            class="btn btn-info w-100 py-2 font-weight-bold"
          >
            Check Health Status (/health)
          </a>
        </div>
      </div>
      <p class="mt-3 text-secondary text-center">
        Status: Error Mode ({{ error_mode }}) | Latency Mode ({{ latency_mode
        }})
      </p>
    </div>

    <script>
      function toggle(feature) {
        fetch("/toggle/" + feature).then(() => location.reload());
      }
    </script>
  </body>
</html>
